version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-happyrobot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-happyrobot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-happyrobot}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-happyrobot}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-happyrobot}:${POSTGRES_PASSWORD:-happyrobot_secret}@db:5432/${POSTGRES_DB:-happyrobot}
      API_KEY: ${API_KEY:-hr-dev-key-2025}
      FMCSA_API_KEY: ${FMCSA_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
